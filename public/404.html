<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.M.E.S · 404</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Courier New', monospace;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: #ff4d4d;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.3);
            animation: glitch 3s infinite;
        }
        @keyframes glitch {
            0%, 100% { transform: skew(0deg); }
            95% { transform: skew(0deg); }
            96% { transform: skew(10deg); text-shadow: 2px 0 #00ff00; }
            97% { transform: skew(-10deg); text-shadow: -2px 0 #0000ff; }
            98% { transform: skew(5deg); }
        }
        .error-title {
            font-size: 2rem;
            color: #d1d1d1;
            margin-bottom: 1rem;
        }
        .error-message {
            color: #8a8a8a;
            margin-bottom: 2rem;
            line-height: 1.6;
            border-left: 2px solid #ff4d4d;
            padding-left: 1rem;
            text-align: left;
        }
        .terminal-line {
            color: #8a8a8a;
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        .terminal-prompt {
            color: #ff4d4d;
        }
        .home-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            text-decoration: none;
            transition: all 0.3s;
        }
        .home-link:hover {
            background: #ff4d4d;
            color: #0a0a0a;
        }
        .footer {
            position: absolute;
            bottom: 1rem;
            left: 0;
            width: 100%;
            text-align: center;
            color: #333;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-title">NOT FOUND</div>
        <a href="/" class="home-link">← BACK TO HOME</a>
    </div>
    
    <div class="footer">
        <span>W.M.E.S · white mask elite security</span>
    </div>
</body>
</html>
